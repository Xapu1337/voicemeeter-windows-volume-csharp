name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.8.0.2

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  build:
    name: Build and publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore VoicemeeterWindowsVolume.csproj

      - name: Publish single-file exe
        run: |
          dotnet publish VoicemeeterWindowsVolume.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            --output publish/

      - name: Zip release artifact
        run: Compress-Archive -Path publish\VMWV.exe -DestinationPath VMWV-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: VMWV-${{ github.ref_name }}-win-x64.zip
